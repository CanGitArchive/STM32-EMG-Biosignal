; STM32-EMG-Biosignal : PlatformIO project config
; Board     : ST Nucleo-F446RE (STM32F446RET6, Cortex-M4F @180 MHz, FPU + DSP, 2x bxCAN)
; Framework : STM32Cube HAL (NOT Arduino : real firmware, per project scope)
; Toolchain : PlatformIO downloads the ststm32 platform + arm-none-eabi-gcc on first build.

[env:nucleo_f446re]
platform = ststm32
board = nucleo_f446re
framework = stm32cube

; Onboard ST-LINK : flashing + debugging over the Nucleo's Mini-USB, no external probe.
upload_protocol = stlink
debug_tool = stlink

; Serial debug / EMG serial-plot (Phase 2). Nucleo virtual COM port default.
monitor_speed = 115200
; log2file : every Serial Monitor session also writes a platformio-device-monitor-*.log
; file into the project root (handy for capturing raw-scope traces). Remove later.
monitor_filters = log2file

build_flags =
    -Wall
    -mfpu=fpv4-sp-d16
    -mfloat-abi=hard
    ; -D ARM_MATH_CM4   ; CMSIS-DSP only: add this only if we later adopt that library

; --- Float ABI on this platform (mapped out 2026-06-11) ---
; This board runs hard-float (Cortex-M4F FPU). build_flags above compile EVERYTHING hard (framework,
; our src, and lib/FreeRTOS). But PlatformIO's build_flags do NOT reach the ststm32 LINK command, so
; without help the linker pulls the soft-float crt0/libc and the link dies with
; "uses VFP register arguments, firmware.elf does not". fpu_link.py adds the same two flags to
; LINKFLAGS so the link selects the hard-float runtime and tags the output hard. Both halves required.
extra_scripts = post:fpu_link.py

; FreeRTOS (Phase 1) and CMSIS-DSP (Phase 3) are added as lib_deps / middleware when
; those phases start. The scaffold stage builds a bare HAL main to prove the toolchain
; end to end (locally and in CI) before the board arrives.
